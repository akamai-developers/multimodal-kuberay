# ─────────────────────────────────────────────────────────────────────────────
# Stable proxy service — KubeRay creates head/serve services with random
# suffixes.  This service uses a predictable name so the research pipeline
# and other consumers can reach Nemotron Parse reliably.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: nemotron-parse-svc
  namespace: default
  labels:
    app: nemotron-parse
spec:
  selector:
    # Custom label added to the head pod template (stable across cluster restarts;
    # ray.io/cluster gets a random suffix from KubeRay)
    app: nemotron-parse
    ray.io/node-type: head
  ports:
    - name: serve
      port: 8000
      targetPort: 8000
      protocol: TCP
    - name: dashboard
      port: 8265
      targetPort: 8265
      protocol: TCP
  type: ClusterIP
---
# ─────────────────────────────────────────────────────────────────────────────
# RayService — Nemotron Parse v1.2 OCR (MIG-partitioned)
#
# Each physical GPU is partitioned into 4x 1g.24gb MIG instances (24 GB
# each) via the GPU Operator MIG manager.  With 2x 2-GPU nodes that
# gives 16 MIG devices total.  Each replica uses 1 MIG device.
#
# Architecture: 16 worker pods × 1 MIG device each.  CDI gives each pod
# exactly 1 MIG instance as CUDA device 0 — no runtime patching needed.
# Trade-off: more Ray worker overhead (16 processes), but clean GPU setup.
#
# cloudpickle>=3.1.0 fixes the __module__ KeyError with trust_remote_code.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: ray.io/v1
kind: RayService
metadata:
  name: ray-serve-nemotron-parse
spec:
  # GPU-intensive workers consume all MIG devices on both nodes.
  # The default NewClusterBeforeOldDeleted strategy creates a second
  # cluster that can never schedule (needs 16 GPUs, all are taken).
  # None = in-place update; if the spec forces a new cluster KubeRay
  # will delete the old one first.
  upgradeStrategy:
    type: None
  serveConfigV2: |
    applications:
    - name: nemotron-parse
      import_path: ray.serve.llm:build_openai_app
      route_prefix: "/"
      args:
        llm_configs:
        - model_loading_config:
            model_id: nvidia/NVIDIA-Nemotron-Parse-v1.2
            model_source: /model-cache
          engine_kwargs:
            dtype: bfloat16
            max_model_len: 8192
            max_num_seqs: 8
            gpu_memory_utilization: 0.85
            trust_remote_code: true
            enforce_eager: true
            disable_log_stats: false
            tensor_parallel_size: 1
            load_format: safetensors
          runtime_env:
            pip:
              - "numpy<2.0"
              - "cloudpickle>=3.1.0"
              - timm==1.0.22
              - albumentations==2.0.8
              - open_clip_torch
          deployment_config:
            num_replicas: 16              # All 16 MIG workers serve from startup
            max_ongoing_requests: 16
            health_check_period_s: 5
            health_check_timeout_s: 120
          placement_group_config:
            strategy: SPREAD
            bundles:
              - GPU: 1
                CPU: 1

  rayClusterConfig:
    rayVersion: "2.54.0"
    enableInTreeAutoscaling: false

    headGroupSpec:
      rayStartParams:
        num-cpus: "0"
        num-gpus: "0"
      template:
        metadata:
          labels:
            app: nemotron-parse
        spec:
          containers:
            - name: ray-head
              image: rayproject/ray-llm:2.54.0-py311-cu128
              env:
                - name: RAY_GRAFANA_HOST
                  value: "http://kube-prometheus-stack-grafana.kube-system.svc.cluster.local"
                - name: RAY_GRAFANA_IFRAME_HOST
                  value: "http://localhost:3000"
                - name: RAY_PROMETHEUS_HOST
                  value: "http://kube-prometheus-stack-prometheus.kube-system.svc.cluster.local:9090"
              ports:
                - containerPort: 8000
                  name: serve
                  protocol: TCP
                - containerPort: 8080
                  name: metrics
                  protocol: TCP
                - containerPort: 6379
                  name: gcs
                  protocol: TCP
                - containerPort: 8265
                  name: dashboard
                  protocol: TCP
                - containerPort: 10001
                  name: client
                  protocol: TCP
              resources:
                requests:
                  cpu: 2
                  memory: 8Gi
              volumeMounts:
                - name: dshm
                  mountPath: /dev/shm
          volumes:
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 12Gi

    workerGroupSpecs:
      # ── 1 worker per MIG device (16 total) ──────────────────────────────
      # Each pod requests exactly 1 nvidia.com/gpu (= 1 MIG instance).
      # CDI gives each pod its MIG device as CUDA device 0 — no runtime
      # patching of Ray or vLLM needed.  Trade-off: 16 Ray worker
      # processes instead of 2, but eliminates mig-wrapper.sh patches.
      # num-cpus=4: Each worker needs headroom for placement-group (1 CPU),
      # Serve proxy actor (1 CPU), OpenAiIngress replica (1 CPU if co-located),
      # and the model download task (1 CPU).  Without enough logical CPUs,
      # the initialize_remote_node download task deadlocks
      # (PENDING_NODE_ASSIGNMENT).
      - replicas: 16
        minReplicas: 16
        maxReplicas: 16
        numOfHosts: 1
        groupName: nemotron-gpu-group
        rayStartParams:
          num-gpus: "1"
          num-cpus: "4"
        template:
          spec:
            # Keep workers on MIG-partitioned nodes only (4-GPU node is for MiniMax)
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: nvidia.com/mig.config
                          operator: In
                          values: ["all-1g.24gb"]

            initContainers:
              # Download model from Linode Object Storage + pre-warm pip cache in parallel.
              # The runtime_env pip install runs when Ray creates the Serve
              # replica, but with wheels already in the cache it completes
              # in seconds instead of minutes.
              - name: prepare-deps
                image: rayproject/ray-llm:2.54.0-py311-cu128
                command: ["/bin/bash", "/scripts/prepare-deps-nemotron.sh"]
                envFrom:
                  - secretRef:
                      name: obj-store-secret
                env:
                  - name: S5CMD_CONCURRENCY
                    value: "64"
                  - name: S5CMD_PART_SIZE
                    value: "64"
                volumeMounts:
                  - name: model-cache
                    mountPath: /model-cache
                  - name: pip-cache
                    mountPath: /home/ray/.cache/pip
                  - name: model-sync
                    mountPath: /scripts

            containers:
              - name: ray-worker
                image: rayproject/ray-llm:2.54.0-py311-cu128
                # Override KubeRay's auto-injected readiness probe.
                # The default probe checks BOTH raylet health AND Serve
                # proxy health (port 8000).  Only workers hosting a vLLM
                # replica run a Serve proxy, so idle workers always fail
                # the second check and show 0/1 Ready.  This probe checks
                # only raylet health, which passes on all workers.
                readinessProbe:
                  exec:
                    command:
                      - bash
                      - -c
                      - "wget --tries 1 -T 2 -q -O- http://localhost:52365/api/local_raylet_healthz | grep success"
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 4
                  failureThreshold: 3
                  successThreshold: 1
                env:
                  - name: HUGGING_FACE_HUB_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: hf-secret
                        key: hf_token
                resources:
                  requests:
                    cpu: 3
                    memory: 8Gi
                    nvidia.com/gpu: "1"
                  limits:
                    memory: 16Gi
                    nvidia.com/gpu: "1"
                volumeMounts:
                  - name: model-cache
                    mountPath: /model-cache
                  - name: pip-cache
                    mountPath: /home/ray/.cache/pip
                  - name: dshm
                    mountPath: /dev/shm
                  - name: model-sync
                    mountPath: /scripts
            volumes:
              - name: model-cache
                emptyDir:
                  sizeLimit: 8Gi   # Nemotron Parse v1.2 is <1B params (~2GB weights)
              - name: pip-cache
                emptyDir:
                  sizeLimit: 4Gi
              - name: dshm
                emptyDir:
                  medium: Memory
                  sizeLimit: 4Gi
              - name: model-sync
                configMap:
                  name: model-sync-scripts
                  defaultMode: 0755
