# Model Cache Upload Job
# Downloads models from HuggingFace and uploads them to Linode Object Storage.
# Idempotent — skips models that are already cached in the bucket.
#
# NOTE: Kubernetes Jobs are immutable. If you need to re-run this Job
# (e.g. after adding a new model), delete the old Job first:
#   kubectl delete job model-upload
apiVersion: batch/v1
kind: Job
metadata:
  name: model-upload
spec:
  backoffLimit: 4
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: upload
          image: python:3.11-slim
          command: ["/bin/bash", "/scripts/model-upload.sh"]
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-secret
                  key: hf_token
          envFrom:
            - secretRef:
                name: obj-store-secret
          resources:
            requests:
              cpu: 2
              memory: 4Gi
            limits:
              memory: 8Gi
          volumeMounts:
            - name: model-upload-script
              mountPath: /scripts
              readOnly: true
            - name: staging
              mountPath: /staging
      volumes:
        - name: model-upload-script
          configMap:
            name: model-upload-scripts
            defaultMode: 0755
        - name: staging
          emptyDir:
            sizeLimit: 600Gi  # MiniMax-M2.5 is a large frontier MoE; needs ~400-500GB staging
