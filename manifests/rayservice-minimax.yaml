# ─────────────────────────────────────────────────────────────────────────────
# Stable proxy service — KubeRay creates head/serve services with random suffixes
# (e.g. ray-serve-minimax-xdssr-head-svc). This service targets the Ray head pod
# directly via labels so other components can use a predictable name.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: minimax-llm-svc
  namespace: default
  labels:
    app: minimax-llm
spec:
  selector:
    app: minimax
    ray.io/node-type: head
  ports:
    - name: serve
      port: 8000
      targetPort: 8000
      protocol: TCP
    - name: dashboard
      port: 8265
      targetPort: 8265
      protocol: TCP
  type: ClusterIP
---
apiVersion: ray.io/v1
kind: RayService
metadata:
  name: ray-serve-minimax
spec:
  serveConfigV2: |
    applications:
    - name: minimax
      import_path: ray.serve.llm:build_openai_app
      route_prefix: "/"
      args:
        llm_configs:
        - model_loading_config:
            model_id: minimax-m2.5
            model_source: /model-cache
          engine_kwargs:
            max_model_len: 190000         # NVFP4 fits 190K on 2 GPUs (96 GB each)
            gpu_memory_utilization: 0.95
            tensor_parallel_size: 2       # 2 GPUs per replica (2 replicas on 4-GPU node)
            trust_remote_code: true       # Required for minimax_m2 architecture
            disable_custom_all_reduce: true
            max_num_batched_tokens: 16384
            max_num_seqs: 64
            disable_log_stats: false
            enable_auto_tool_choice: true
            tool_call_parser: minimax_m2
            reasoning_parser: minimax_m2_append_think
          deployment_config:
            autoscaling_config:
              min_replicas: 2
              max_replicas: 2   # 2 replicas × TP=2 = 4 GPUs on one node
              target_ongoing_requests: 16
              metrics_interval_s: 5
              look_back_period_s: 30
              upscale_delay_s: 15
              downscale_delay_s: 600
            max_ongoing_requests: 64
  rayClusterConfig:
    rayVersion: "2.54.0"
    enableInTreeAutoscaling: false  # Fixed 2 replicas — no cluster autoscaling needed
    headGroupSpec:
      rayStartParams:
        num-cpus: "0"
        num-gpus: "0"
      template:
        metadata:
          labels:
            app: minimax
        spec:
          containers:
            - name: ray-head
              image: rayproject/ray-llm:2.54.0-py311-cu128
              env:
                - name: RAY_GRAFANA_HOST
                  value: "http://kube-prometheus-stack-grafana.kube-system.svc.cluster.local"
                - name: RAY_GRAFANA_IFRAME_HOST
                  value: "http://localhost:3000"
                - name: RAY_PROMETHEUS_HOST
                  value: "http://kube-prometheus-stack-prometheus.kube-system.svc.cluster.local:9090"
              ports:
                - containerPort: 8000
                  name: serve
                  protocol: TCP
                - containerPort: 8080
                  name: metrics
                  protocol: TCP
                - containerPort: 6379
                  name: gcs
                  protocol: TCP
                - containerPort: 8265
                  name: dashboard
                  protocol: TCP
                - containerPort: 10001
                  name: client
                  protocol: TCP
              resources:
                requests:
                  cpu: 2
                  memory: 16Gi
              volumeMounts:
                - name: dshm
                  mountPath: /dev/shm
          volumes:
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 16Gi
    workerGroupSpecs:
      - replicas: 1
        minReplicas: 1
        maxReplicas: 1
        numOfHosts: 1
        groupName: minimax-gpu-group
        rayStartParams:
          num-gpus: "4"
        template:
          spec:
            initContainers:
              - name: model-download
                image: alpine:3.20
                command: ["/bin/sh", "/scripts/model-sync.sh", "lukealonso/MiniMax-M2.5-NVFP4", "/model-cache"]
                envFrom:
                  - secretRef:
                      name: obj-store-secret
                env:
                  - name: PUSHGATEWAY_URL
                    value: "http://prometheus-pushgateway.kube-system.svc.cluster.local:9091"
                volumeMounts:
                  - name: model-cache
                    mountPath: /model-cache
                  - name: model-sync
                    mountPath: /scripts
            containers:
              - name: ray-worker
                image: rayproject/ray-llm:2.54.0-py311-cu128
                env:
                  - name: SAFETENSORS_FAST_GPU
                    value: "1"
                  - name: VLLM_WORKER_MULTIPROC_METHOD
                    value: "spawn"
                  - name: VLLM_NVFP4_GEMM_BACKEND
                    value: "cutlass"
                  - name: VLLM_USE_FLASHINFER_MOE_FP4
                    value: "0"
                  - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
                    value: "1"
                  - name: VLLM_ATTENTION_BACKEND
                    value: "FLASH_ATTN"
                  - name: NCCL_IB_DISABLE
                    value: "1"
                  - name: OMP_NUM_THREADS
                    value: "8"
                  - name: HUGGING_FACE_HUB_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: hf-secret
                        key: hf_token
                resources:
                  limits:
                    memory: 256Gi
                    nvidia.com/gpu: "4"   # All 4 GPUs — Ray Serve schedules 2× TP=2 replicas
                  requests:
                    cpu: 16
                    memory: 128Gi
                    nvidia.com/gpu: "4"
                volumeMounts:
                  - name: model-cache
                    mountPath: /model-cache
                  - name: dshm
                    mountPath: /dev/shm
            volumes:
              - name: model-cache
                emptyDir:
                  sizeLimit: 200Gi  # NVFP4 quantized model is ~130 GB on disk
              - name: dshm
                emptyDir:
                  medium: Memory
                  sizeLimit: 64Gi
              - name: model-sync
                configMap:
                  name: model-sync-scripts
                  defaultMode: 0755
