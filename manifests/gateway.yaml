apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: llm-gateway
  namespace: default
spec:
  gatewayClassName: envoy
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-route
  namespace: default
spec:
  parentRefs:
  - name: llm-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /v1/
    backendRefs:
    - name: minimax-llm-svc
      port: 8000
    timeouts:
      request: "300s"   # MiniMax M2.5 is a large MoE; synthesis can take time
      backendRequest: "300s"
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: llm-gateway-auth
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: llm-gateway
  authorization:
    defaultAction: Deny
    # default to deny all requests, the auth section is added by our Tiltfile.
---
# Extend client-side idle & stream timeouts for long-lived WebSocket sessions.
# Without this, Envoy kills idle connections after ~5 minutes.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: llm-gateway-client-policy
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: llm-gateway
  timeout:
    http:
      idleTimeout: "3600s"         # 1 hour — keep long-running research streams alive
      streamIdleTimeout: "1800s"   # 30 min — idle timeout per stream
