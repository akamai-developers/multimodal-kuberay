# ─────────────────────────────────────────────────────────────────────────────
# Stable proxy service — KubeRay creates head/serve services with random suffixes
# (e.g. ray-serve-minimax-xdssr-head-svc). This service targets the Ray head pod
# directly via labels so other components can use a predictable name.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: minimax-llm-svc
  namespace: default
  labels:
    app: minimax-llm
spec:
  selector:
    app: minimax
    ray.io/node-type: head
  ports:
    - name: serve
      port: 8000
      targetPort: 8000
      protocol: TCP
    - name: dashboard
      port: 8265
      targetPort: 8265
      protocol: TCP
  type: LoadBalancer
---
apiVersion: ray.io/v1
kind: RayService
metadata:
  name: ray-serve-minimax
spec:
  serveConfigV2: |
    applications:
    - name: minimax
      import_path: ray.serve.llm:build_openai_app
      route_prefix: "/"
      args:
        llm_configs:
        - model_loading_config:
            model_id: minimax-m2.5
            model_source: /model-cache
          engine_kwargs:
            dtype: bfloat16
            max_model_len: 65536          # Pipeline sends ~33K tokens; do not reduce below that
            gpu_memory_utilization: 0.92  # 4x96GB = 384GB VRAM, aggressive utilisation is fine
            tensor_parallel_size: 4       # All 4 Blackwells on the large node
            trust_remote_code: true       # Required for minimax_m2 architecture
            disable_log_stats: false
            enable_auto_tool_choice: true
            tool_call_parser: minimax_m2
            reasoning_parser: minimax_m2_append_think
          deployment_config:
            autoscaling_config:
              min_replicas: 1
              max_replicas: 1   # One 4-GPU node; no horizontal scaling
              target_ongoing_requests: 8
              metrics_interval_s: 5
              look_back_period_s: 30
              upscale_delay_s: 15
              downscale_delay_s: 600
            max_ongoing_requests: 32
  rayClusterConfig:
    rayVersion: "2.54.0"
    enableInTreeAutoscaling: false  # Fixed single replica — no cluster autoscaling needed
    headGroupSpec:
      rayStartParams:
        num-cpus: "0"
        num-gpus: "0"
      template:
        metadata:
          labels:
            app: minimax
        spec:
          containers:
            - name: ray-head
              image: rayproject/ray-llm:2.54.0-py311-cu128
              env:
                - name: RAY_GRAFANA_HOST
                  value: "http://kube-prometheus-stack-grafana.kube-system.svc.cluster.local"
                - name: RAY_GRAFANA_IFRAME_HOST
                  value: "http://localhost:3000"
                - name: RAY_PROMETHEUS_HOST
                  value: "http://kube-prometheus-stack-prometheus.kube-system.svc.cluster.local:9090"
              ports:
                - containerPort: 8000
                  name: serve
                  protocol: TCP
                - containerPort: 8080
                  name: metrics
                  protocol: TCP
                - containerPort: 6379
                  name: gcs
                  protocol: TCP
                - containerPort: 8265
                  name: dashboard
                  protocol: TCP
                - containerPort: 10001
                  name: client
                  protocol: TCP
              resources:
                requests:
                  cpu: 2
                  memory: 16Gi
              volumeMounts:
                - name: dshm
                  mountPath: /dev/shm
          volumes:
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 16Gi
    workerGroupSpecs:
      - replicas: 1
        minReplicas: 1
        maxReplicas: 1
        numOfHosts: 1
        groupName: minimax-gpu-group
        rayStartParams:
          num-gpus: "4"
        template:
          spec:
            initContainers:
              - name: model-download
                image: alpine:3.20
                command: ["/bin/sh", "/scripts/model-sync.sh", "MiniMaxAI/MiniMax-M2.5", "/model-cache"]
                envFrom:
                  - secretRef:
                      name: obj-store-secret
                volumeMounts:
                  - name: model-cache
                    mountPath: /model-cache
                  - name: model-sync
                    mountPath: /scripts
            containers:
              - name: ray-worker
                image: rayproject/ray-llm:2.54.0-py311-cu128
                env:
                  - name: SAFETENSORS_FAST_GPU
                    value: "1"
                  - name: HUGGING_FACE_HUB_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: hf-secret
                        key: hf_token
                resources:
                  limits:
                    memory: 256Gi
                    nvidia.com/gpu: "4"   # All 4 GPUs — only fits on the large node
                  requests:
                    cpu: 16
                    memory: 128Gi
                    nvidia.com/gpu: "4"
                volumeMounts:
                  - name: model-cache
                    mountPath: /model-cache
                  - name: dshm
                    mountPath: /dev/shm
            volumes:
              - name: model-cache
                emptyDir:
                  sizeLimit: 520Gi  # MiniMax-M2.5 is a large frontier MoE model
              - name: dshm
                emptyDir:
                  medium: Memory
                  sizeLimit: 64Gi
              - name: model-sync
                configMap:
                  name: model-sync-scripts
                  defaultMode: 0755
