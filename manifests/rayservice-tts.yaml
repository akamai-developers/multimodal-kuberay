apiVersion: ray.io/v1
kind: RayService
metadata:
  name: ray-serve-tts
spec:
  serveConfigV2: |
    applications:
    - name: tts
      import_path: tts_app:deployment
      route_prefix: "/"
      deployments:
      - name: MagpieTTSDeployment
        autoscaling_config:
          min_replicas: 1
          max_replicas: 2
          target_ongoing_requests: 4
        max_ongoing_requests: 8
        ray_actor_options:
          num_gpus: 1
          num_cpus: 4
      runtime_env:
        pip:
          - "nemo_toolkit[tts] @ git+https://github.com/NVIDIA/NeMo.git@main"
          - kaldialign
          - soundfile
          - httpx
        env_vars:
          PYTHONPATH: "/home/ray/serve:$PYTHONPATH"
  rayClusterConfig:
    rayVersion: "2.54.0"
    headGroupSpec:
      rayStartParams:
        num-cpus: "0"
        num-gpus: "0"
      template:
        spec:
          containers:
            - name: ray-head
              image: rayproject/ray:2.54.0-py311-cu128
              env:
                - name: PYTHONPATH
                  value: "/home/ray/serve"
              ports:
                - containerPort: 8000
                  name: serve
                  protocol: TCP
                - containerPort: 8080
                  name: metrics
                  protocol: TCP
                - containerPort: 6379
                  name: gcs
                  protocol: TCP
                - containerPort: 8265
                  name: dashboard
                  protocol: TCP
                - containerPort: 10001
                  name: client
                  protocol: TCP
              resources:
                requests:
                  cpu: 2
                  memory: 4Gi
              volumeMounts:
                - name: serve-code
                  mountPath: /home/ray/serve
          volumes:
            - name: serve-code
              configMap:
                name: tts-serve-code
    workerGroupSpecs:
      - replicas: 1
        minReplicas: 1
        maxReplicas: 2
        numOfHosts: 1
        groupName: tts-gpu-group
        rayStartParams:
          num-gpus: "1"
        template:
          spec:
            initContainers:
              - name: model-download
                image: alpine:3.20
                command: ["/bin/sh", "-c"]
                args:
                  - |
                    set -e
                    echo "Installing s5cmd..."
                    wget -q -O /tmp/s5cmd.tar.gz \
                      "https://github.com/peak/s5cmd/releases/download/v2.3.0/s5cmd_2.3.0_Linux-64bit.tar.gz"
                    tar xzf /tmp/s5cmd.tar.gz -C /usr/local/bin && rm /tmp/s5cmd.tar.gz
                    echo "Downloading MagpieTTS from s3://${MODEL_BUCKET}/..."
                    s5cmd --endpoint-url "https://${S3_ENDPOINT_HOSTNAME}" \
                      sync "s3://${MODEL_BUCKET}/nvidia/magpie_tts_multilingual_357m/*" /model-cache/ \
                      || echo "WARNING: TTS model not in S3 cache, will download from NGC at startup"
                    echo "Init complete."
                env:
                  - name: S3_ENDPOINT_HOSTNAME
                    valueFrom:
                      secretKeyRef:
                        name: obj-store-secret
                        key: endpoint_hostname
                  - name: AWS_ACCESS_KEY_ID
                    valueFrom:
                      secretKeyRef:
                        name: obj-store-secret
                        key: access_key
                  - name: AWS_SECRET_ACCESS_KEY
                    valueFrom:
                      secretKeyRef:
                        name: obj-store-secret
                        key: secret_key
                  - name: AWS_REGION
                    valueFrom:
                      secretKeyRef:
                        name: obj-store-secret
                        key: region
                  - name: MODEL_BUCKET
                    valueFrom:
                      secretKeyRef:
                        name: obj-store-secret
                        key: bucket
                volumeMounts:
                  - name: model-cache
                    mountPath: /model-cache
            containers:
              - name: ray-worker
                image: rayproject/ray:2.54.0-py311-cu128
                env:
                  - name: PYTHONPATH
                    value: "/home/ray/serve"
                  - name: HUGGING_FACE_HUB_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: hf-secret
                        key: hf_token
                  - name: HF_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: hf-secret
                        key: hf_token
                  - name: TTS_MODEL_SOURCE
                    value: "/model-cache"
                resources:
                  limits:
                    memory: 16Gi
                    nvidia.com/gpu: "1"
                  requests:
                    cpu: 4
                    memory: 8Gi
                    nvidia.com/gpu: "1"
                volumeMounts:
                  - name: serve-code
                    mountPath: /home/ray/serve
                  - name: model-cache
                    mountPath: /model-cache
            volumes:
              - name: serve-code
                configMap:
                  name: tts-serve-code
              - name: model-cache
                emptyDir: {}
