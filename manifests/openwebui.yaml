# ─────────────────────────────────────────────────────────────────────────────
# OpenWebUI — persistent storage for user accounts, settings and chat history
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openwebui-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# ─────────────────────────────────────────────────────────────────────────────
# OpenWebUI Deployment
# Configured to talk directly to the MiniMax Ray Serve service (intra-cluster,
# no gateway hop) and to the Pipelines server for the research pipeline.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: default
  labels:
    app: openwebui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      containers:
        - name: openwebui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - containerPort: 8080
              name: http
          env:
            # ── Backends: MiniMax M2.5 + Pipelines server ─────────────────
            # OpenWebUI v0.8.x discovers models (including pipelines) from
            # all entries in OPENAI_API_BASE_URLS (semicolon-separated).
            - name: OPENAI_API_BASE_URLS
              value: "http://minimax-llm-svc.default.svc.cluster.local:8000/v1;http://openwebui-pipelines-svc.default.svc.cluster.local:9099"
            - name: OPENAI_API_KEYS
              value: "test_token;test_token"
            - name: DEFAULT_MODELS
              value: "mcp_research_pipeline"
            # ── Auto-create admin account on first boot ───────────────────
            # Skips the registration page entirely — credentials injected
            # from the openwebui-secret (sourced from .env via Tiltfile).
            - name: WEBUI_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: openwebui-secret
                  key: admin_email
            - name: WEBUI_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openwebui-secret
                  key: admin_password
            - name: WEBUI_ADMIN_NAME
              value: "Admin"
            # ── General settings ──────────────────────────────────────────
            - name: WEBUI_AUTH
              value: "True"
            - name: ENABLE_WEBSOCKET_SUPPORT
              value: "True"
            - name: AIOHTTP_CLIENT_TIMEOUT
              value: "1200"
            - name: WEBUI_NAME
              value: "Deep Research Agent"
          # ── Seed streaming config ─────────────────────────────────────
          # OpenWebUI sends stream=false for pipeline models by default.
          # The postStart hook sets DEFAULT_MODEL_PARAMS.stream_response=True
          # via the Admin API.  nohup + fd redirect ensures sh exits
          # immediately so the hook doesn't block container readiness.
          # NOTE: The pipeline server also patches stream=True server-side
          # as a belt-and-suspenders measure (see pipelines container command).
          lifecycle:
            postStart:
              exec:
                command: [sh, -c, "nohup /scripts/seed-streaming-config.sh >/dev/null 2>&1 &"]
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
            - name: seed-config-script
              mountPath: /scripts
              readOnly: true
            - name: custom-css
              mountPath: /app/backend/open_webui/static/custom.css
              subPath: custom.css
              readOnly: true
            - name: logos
              mountPath: /app/backend/open_webui/static/logo.png
              subPath: logo.png
              readOnly: true
            - name: logos
              mountPath: /app/backend/open_webui/static/splash.png
              subPath: splash.png
              readOnly: true
            - name: logos
              mountPath: /app/backend/open_webui/static/splash-dark.png
              subPath: splash-dark.png
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openwebui-data
        - name: seed-config-script
          configMap:
            name: seed-config-scripts
            defaultMode: 0755
        - name: custom-css
          configMap:
            name: openwebui-custom-css
        - name: logos
          configMap:
            name: openwebui-logos
---
# ─────────────────────────────────────────────────────────────────────────────
# OpenWebUI Service — LoadBalancer gives it its own public IP so it can be
# migrated to a different cluster without touching backend routing.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: openwebui-svc
  namespace: default
  labels:
    app: openwebui
spec:
  selector:
    app: openwebui
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
# ─────────────────────────────────────────────────────────────────────────────
# OpenWebUI Pipelines — hosts the deep-research pipeline Python module.
# The ConfigMap (created by Tiltfile from serve/mcp_research_pipeline.py) is
# mounted into PIPELINES_DIR so the server auto-loads it on startup.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui-pipelines
  namespace: default
  labels:
    app: openwebui-pipelines
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui-pipelines
  template:
    metadata:
      labels:
        app: openwebui-pipelines
    spec:
      initContainers:
        - name: copy-pipelines
          image: busybox:1.37
          command: ["sh", "-c", "cp /cm/*.py /pipelines/"]
          volumeMounts:
            - name: pipeline-cm
              mountPath: /cm
            - name: pipeline-code
              mountPath: /pipelines
      containers:
        - name: pipelines
          image: ghcr.io/open-webui/pipelines:main
          # Override default entrypoint to force streaming for all pipe-type
          # pipelines. OpenWebUI sometimes sends stream=false for pipeline
          # models despite config, but its response handler checks Content-Type
          # (not the request flag) — so returning text/event-stream always works.
          command: [bash, -c]
          args:
            - |
              sed -i '/^    def job():/a\        form_data.stream = True  # Force streaming for all pipelines' /app/main.py
              echo "[pipelines-patch] Forced form_data.stream = True in generate_openai_chat_completion"
              bash start.sh
          ports:
            - containerPort: 9099
              name: http
          env:
            - name: PIPELINES_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openwebui-secret
                  key: api_key
            - name: MCP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openwebui-secret
                  key: api_key
            - name: PIPELINES_DIR
              value: "/app/pipelines"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /
              port: 9099
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: pipeline-code
              mountPath: /app/pipelines
      volumes:
        - name: pipeline-cm
          configMap:
            name: research-pipeline-code
        - name: pipeline-code
          emptyDir: {}
---
# ─────────────────────────────────────────────────────────────────────────────
# Pipelines Service — ClusterIP (internal only; OpenWebUI talks to it directly)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: openwebui-pipelines-svc
  namespace: default
  labels:
    app: openwebui-pipelines
spec:
  selector:
    app: openwebui-pipelines
  ports:
    - name: http
      port: 9099
      targetPort: 9099
      protocol: TCP
  type: ClusterIP
---
# ─────────────────────────────────────────────────────────────────────────────
# OpenWebUI HTTPRoute — exposes the web UI via the llm-gateway at root (/)
# OpenWebUI serves natively from root — no path rewriting needed.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openwebui-route
  namespace: default
spec:
  parentRefs:
  - name: llm-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: openwebui-svc
      port: 80
---
# ─────────────────────────────────────────────────────────────────────────────
# OpenWebUI SecurityPolicy — allows all traffic to the OpenWebUI route.
# OpenWebUI has its own authentication (WEBUI_AUTH: True), so gateway-level
# auth is not needed. This policy overrides the deny-by-default llm-gateway-auth.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: openwebui-route-auth
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: openwebui-route
  authorization:
    defaultAction: Allow
