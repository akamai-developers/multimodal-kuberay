apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: llm-gateway
  namespace: default
spec:
  gatewayClassName: envoy
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-route
  namespace: default
spec:
  parentRefs:
  - name: llm-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: ray-serve-llm-serve-svc
      port: 8000
    timeouts:
      request: "180s"
      backendRequest: "180s"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tts-route
  namespace: default
spec:
  parentRefs:
  - name: llm-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /v1/audio
    backendRefs:
    - name: ray-serve-tts-serve-svc
      port: 8000
    timeouts:
      request: "180s"  # VLM→TTS pipeline needs more than the 15s default
      backendRequest: "180s"
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: llm-gateway-auth
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: llm-gateway
  authorization:
    defaultAction: Deny
    # default to deny all requests, the auth section is added by our Tiltfile.
---
# Extend client-side idle & stream timeouts for long-lived WebSocket sessions.
# Without this, Envoy kills idle connections after ~5 minutes.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: llm-gateway-client-policy
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: llm-gateway
  timeout:
    http:
      idleTimeout: "3600s"         # 1 hour — keep WebSocket alive during pauses
      streamIdleTimeout: "1800s"   # 30 min — idle timeout per stream
---
# Backend-side: keep connections to Ray Serve alive for long-running streams
# and ensure the WebSocket upgrade type is explicitly enabled.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: tts-backend-policy
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: tts-route
  timeout:
    http:
      connectionIdleTimeout: "3600s"   # 1 hour — match client-side
      maxConnectionDuration: "7200s"   # 2 hours — hard cap
  httpUpgrade:
    - type: websocket
