# Nemotron Parse OCR — 4 replicas (1 GPU each), spread across the 2× 2-GPU worker nodes.
# Uses vllm/vllm-openai:v0.16.0 (CUDA 12.9) which has native nemotron_parse model
# support and Blackwell (sm_120) GPU compatibility.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nemotron-parse
  namespace: default
  labels:
    app: nemotron-parse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nemotron-parse
  template:
    metadata:
      labels:
        app: nemotron-parse
    spec:
      # ── Keep pods OFF the 4-GPU node (reserved for MiniMax M2.5) ────────
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.count
                    operator: In
                    values: ["2"]

      # ── Spread pods evenly across the two 2-GPU worker nodes ───────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: nemotron-parse

      initContainers:
        # Pull model weights from S3 model cache
        - name: model-download
          image: alpine:3.20
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "Installing s5cmd..."
              wget -q -O /tmp/s5cmd.tar.gz \
                "https://github.com/peak/s5cmd/releases/download/v2.3.0/s5cmd_2.3.0_Linux-64bit.tar.gz"
              tar xzf /tmp/s5cmd.tar.gz -C /usr/local/bin && rm /tmp/s5cmd.tar.gz

              echo "Downloading Nemotron-Parse-v1.2 from s3://${MODEL_BUCKET}/nvidia/NVIDIA-Nemotron-Parse-v1.2/..."
              s5cmd --endpoint-url "https://${S3_ENDPOINT_HOSTNAME}" \
                sync "s3://${MODEL_BUCKET}/nvidia/NVIDIA-Nemotron-Parse-v1.2/*" /model-cache/
              echo "Model download complete."
          env:
            - name: S3_ENDPOINT_HOSTNAME
              valueFrom:
                secretKeyRef:
                  name: obj-store-secret
                  key: endpoint_hostname
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: obj-store-secret
                  key: access_key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: obj-store-secret
                  key: secret_key
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: obj-store-secret
                  key: region
            - name: MODEL_BUCKET
              valueFrom:
                secretKeyRef:
                  name: obj-store-secret
                  key: bucket
          volumeMounts:
            - name: model-cache
              mountPath: /model-cache

      containers:
        - name: vllm-serve
          image: vllm/vllm-openai:v0.16.0
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              echo "Installing Nemotron-Parse dependencies..."
              pip install -q albumentations==2.0.8 timm==1.0.22 open_clip_torch

              echo "Starting vLLM server for Nemotron-Parse-v1.2..."
              exec python3 -m vllm.entrypoints.openai.api_server \
                --model /model-cache \
                --served-model-name nvidia/NVIDIA-Nemotron-Parse-v1.2 \
                --dtype bfloat16 \
                --max-num-seqs 4 \
                --max-model-len 8192 \
                --trust-remote-code \
                --chat-template /model-cache/chat_template.jinja \
                --port 8000
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-secret
                  key: hf_token
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: 4
              memory: 16Gi
              nvidia.com/gpu: "1"
            limits:
              memory: 32Gi
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120  # vLLM + model load takes time
            periodSeconds: 15
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: model-cache
              mountPath: /model-cache
            - name: dshm
              mountPath: /dev/shm

      volumes:
        - name: model-cache
          emptyDir:
            sizeLimit: 8Gi   # Nemotron-Parse-v1.2 is <1B params (~2GB weights)
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nemotron-parse-svc
  namespace: default
  labels:
    app: nemotron-parse
spec:
  selector:
    app: nemotron-parse
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
